<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>feels with you</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <!-- Open Graph -->
  <meta property="og:title"       content="mimotomo" />
  <meta property="og:description" content="a little bunny that feels with you, not at you." />
  <meta property="og:image"       content="assets/mimotomo-thumbnail.png" />
  <meta property="og:type"        content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="mimotomo" />
  <meta name="twitter:description" content="a little bunny that feels with you, not at you." />
  <meta name="twitter:image"       content="assets/mimotomo-thumbnail.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/sprite.css" />
</head>
<body>

  <div class="scene">

    <!-- ── Sprite ─────────────────────────────────────────── -->
    <div class="sprite-wrap">
      <div id="sprite" class="sprite emotion-neutral">

        <div class="sprite__tail"></div>

        <div class="sprite__body">
          <div class="sprite__ear sprite__ear--left">
            <div class="sprite__ear-inner"></div>
          </div>
          <div class="sprite__ear sprite__ear--right">
            <div class="sprite__ear-inner"></div>
          </div>

          <div class="sprite__face">
            <div class="sprite__brow sprite__brow--left"></div>
            <div class="sprite__brow sprite__brow--right"></div>
            <div class="sprite__eye sprite__eye--left">
              <div class="sprite__sclera"></div>
            </div>
            <div class="sprite__eye sprite__eye--right">
              <div class="sprite__sclera"></div>
            </div>
            <div class="sprite__nose"></div>
            <div class="sprite__mouth"></div>
          </div>

          <div class="sprite__blush sprite__blush--left"></div>
          <div class="sprite__blush sprite__blush--right"></div>
          <div class="sprite__arm sprite__arm--left"></div>
          <div class="sprite__arm sprite__arm--right"></div>
        </div>

        <div class="sprite__shadow"></div>
        <div class="sprite__tears" aria-hidden="true"></div>
        <div class="sprite__particles" aria-hidden="true"></div>
      </div>
    </div>

    <!-- ── Wordmark ──────────────────────────────────────── -->
    <a class="wordmark" href="https://buymeacoffee.com/emzra" target="_blank" rel="noopener">mimotomo</a>

    <!-- ── Wall canvas — text fragments land here ───────── -->
    <div id="wall-canvas" class="wall-canvas" aria-live="polite"></div>

    <!-- ── GitHub link ───────────────────────────────────── -->
    <a class="github-link" href="https://github.com/emalinegayhart/MimoTomo" target="_blank" rel="noopener" aria-label="GitHub repo">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
          0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757
          -1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305
          3.495.998.108-.776.418-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93
          0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176
          0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405
          1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23
          .645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22
          0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22
          0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57
          C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>

    <!-- ── Hint ──────────────────────────────────────────── -->
    <div id="wall-hint" class="wall-hint">click anywhere and start writing…</div>

    <!-- ── Emotion badge ──────────────────────────────────── -->
    <div id="emotion-badge" class="emotion-badge hidden">
      <span id="badge-emotion">neutral</span>
      <span id="badge-confidence"></span>
    </div>

    <!-- hidden input — captures all typing ───────────────── -->
    <textarea id="input" autocomplete="off" spellcheck="false" aria-hidden="true" tabindex="-1"></textarea>

  </div>

  <script src="js/socket.js"></script>
  <script src="js/sprite.js"></script>
  <script src="js/idle.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
